<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Gestion Trabajadores</title>
    <!-- Conexión a Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header>
        
    </header>

    <main>
        
        <div class="container mt-4">
            <h1 class="text-center">Sistema de Gestion de Trabajadores</h1>
            
            <div class="row">
                
                <div class="col-7">
                    <h2>Formulario</h2>
                    <input type="text" id="nombre" 
                    class="form-control mb-3" 
                    placeholder="Introduce tu nombre">

                    <input type="text" id="apellido" 
                    class="form-control mb-3" 
                    placeholder="Introduce tu apellido">

                    <input type="email" id="correo" 
                    class="form-control mb-3" 
                    placeholder="Introduce tu direccion de correo">
                    <select name="" id="departamento" class="form-select mb-3">
                        <option value="it">IT</option>
                        <option value="marketing">Marketing</option>
                        <option value="ventas">Ventas</option>
                        <option value="ad">Administracion</option>
                    </select>
                    <button id="boton-enviar" class="btn btn-primary w-100">Añadir Trabajadores</button>
                </div>
                
                <div class="col-5">
                    <h2>Lista</h2>
                    <ul id="lista-trabajadores" class="list-group">

                    </ul>
                </div>
            </div>
            
            <div>
                <h2>Resumen de departamentos</h2>
                <div class="d-flex justify-content-around mt-3">
                <p>IT: <span id="resumen-it">0</span></p>
                <p>Marketing: <span id="resumen-marketing">0</span></p>
                <p>Ventas: <span id="resumen-ventas">0</span></p>
                <p>Admin: <span id="resumen-ad">0</span></p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        
    </footer>
    <script src="./index.js"></script>
</body>
</html>
