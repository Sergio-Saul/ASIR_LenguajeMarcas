<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico - SysAdmin</title>
    <link rel="stylesheet" href="styless.css">
</head>
<body>

    <header>
        <nav>
            <ul class="Menu-Principal">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="Servicios.html">Servicios</a></li>
                <li><a href="Soporte.html">Soporte</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="Titulo">Centro de Soporte Técnico</h1>
        <p>Abre un ticket de incidencia y nuestro equipo te responderá lo antes posible.</p>

        <div class="contenedor-formulario">
            
            <form action="#" method="POST" class="formulario-soporte">
                
                <div class="grupo-form">
                    <label for="nombre">Nombre de la Empresa / Usuario:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Empresa S.L." required>
                </div>

                <div class="grupo-form">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="contacto@empresa.com" required>
                </div>

                <div class="grupo-form">
                    <label for="tipo_incidencia">Tipo de Incidencia:</label>
                    <select id="tipo_incidencia" name="tipo_incidencia" required>
                        <option value="">-- Selecciona una opción --</option>
                        <option value="caida">Servidor Caído</option>
                        <option value="seguridad">Brecha de Seguridad</option>
                        <option value="backup">Fallo en Copias de Seguridad</option>
                        <option value="duda">Consulta Técnica General</option>
                    </select>
                </div>

                <div class="grupo-form">
                    <label>Prioridad:</label>
                    <div class="opciones-radio">
                        <input type="radio" id="baja" name="prioridad" value="baja" checked>
                        <label for="baja">Baja</label>

                        <input type="radio" id="media" name="prioridad" value="media">
                        <label for="media">Media</label>

                        <input type="radio" id="alta" name="prioridad" value="alta">
                        <label for="alta">Alta (Urgente)</label>
                    </div>
                </div>

                <div class="grupo-form">
                    <label for="descripcion">Descripción del problema:</label>
                    <textarea id="descripcion" name="descripcion" rows="4" placeholder="Detalla aquí lo que ocurre..." required></textarea>
                </div>

                <div class="grupo-form">
                    <button type="submit" class="boton-enviar">Enviar Ticket de Soporte</button>
                </div>

            </form>
        </div>
    </main>

    <footer>
        <p>Creado por <strong>Sergio Saul Luis Doble</strong></p>
    </footer>

</body>
</html>
